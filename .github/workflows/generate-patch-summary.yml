name: Generate All Patch Summaries
run-name: Generate All Patch Summaries

on:
  repository_dispatch:
    types: [data_updated]
  workflow_dispatch:

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0  # Fetch all history for git operations
          token: ${{ secrets.WORKFLOW_PAT }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate entity relationships
        run: |
          python src/entity_relationship.py
      
      - name: Generate patch summary
        run: |
          python src/summarizer.py
        env:
          GEN_ALL: true
      
      - name: Commit and push summary files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add summaries/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Extract version info from the staged file path
            # Expected path: summaries/patch/FROM_to_TO/lang.md
            VERSION_DIR=$(git diff --name-only --cached | grep "summaries/patch/" | head -n 1 | cut -d'/' -f3)
            
            if [ -n "$VERSION_DIR" ]; then
               READABLE_VER=$(echo "$VERSION_DIR" | sed 's/_to_/ -> /')
               COMMIT_MSG="Auto-generate patch summary ($READABLE_VER)"
            else
               COMMIT_MSG="Auto-generate patch summary"
            fi
            
            git commit -m "$COMMIT_MSG"
            git push origin dev
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
